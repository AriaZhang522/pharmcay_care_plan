services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: careplan
      POSTGRES_USER: careplan
      POSTGRES_PASSWORD: "131421Zyy!"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # 主机 5433，避免与本机已有 PostgreSQL(5432) 冲突
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careplan -d careplan"]
      interval: 3s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - POSTGRES_HOST=db
      - POSTGRES_DB=careplan
      - POSTGRES_USER=careplan
      - POSTGRES_PASSWORD=131421Zyy!
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build: ./backend
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - USE_FAKE_LLM=1   # 注释掉则用真实 Claude API；取消注释则用假 LLM（不花钱、不等待）
      - POSTGRES_HOST=db
      - POSTGRES_DB=careplan
      - POSTGRES_USER=careplan
      - POSTGRES_PASSWORD=131421Zyy!
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.celery worker -l info

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
